<!DOCTYPE html>
<html>
<head>
    <title>Список дел</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
            background-color: #f0f0f0; /* Светло-серый фон */
        }
        h1 { 
            color: blue; /* Синий заголовок */
        }
        ul { 
            list-style: none; 
            padding: 0; 
        }
        li { 
            margin: 10px 0; 
            background: white;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        input[type="text"] {
            padding: 5px;
            width: 200px;
        }
        button {
            padding: 5px 10px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Мои задачи</h1>
    
    <ul>
        {% for task in tasks %}
            <li>
                {{ task }}
                <a href="/delete/{{ loop.index0 }}">Удалить</a>
            </li>
        {% endfor %}
    </ul>

    <h2>Добавить задачу</h2>
    <form method="POST" action="/add">
        <input type="text" name="task" placeholder="Новая задача" required>
        <button type="submit">Добавить</button>
    </form>

    <form action="/clear">
        <button type="submit" style="background-color: orange; color: white;">Очистить всё</button>
    </form>
</body>
</html>
